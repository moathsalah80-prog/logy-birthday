
<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logy's Special Gift</title>
    <style>
        :root {
            --pink: #ff69b4;
            --dark-pink: #ff1493;
            --bg: #000;
            --book-w: clamp(280px, 85vw, 420px); 
            --book-h: clamp(400px, 75vh, 580px);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        
        body { 
            background: var(--bg); overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* ================= 1. شاشة الدخول ================= */
        #welcome-screen {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 30px;
        }
        .welcome-btn {
            padding: 15px 35px; font-size: clamp(1.4rem, 5vw, 2.2rem); font-weight: 900;
            color: #fff; background: transparent; border: 3px solid var(--pink);
            border-radius: 60px; cursor: pointer; box-shadow: 0 0 25px var(--pink); text-transform: uppercase;
        }

        /* ================= 2. مشغل الموسيقى ================= */
        .music-player {
            background: rgba(255, 105, 180, 0.2); padding: 10px 20px; border-radius: 50px;
            display: flex; gap: 15px; border: 1px solid var(--pink);
            backdrop-filter: blur(10px); z-index: 1001; margin-top: 20px;
        }
        .music-player button { background: var(--pink); border: none; color: white; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; font-size: 1.1rem; }

        /* ================= 3. الماتريكس والعد التنازلي ================= */
        #intro-screen {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: none; align-items: center; justify-content: center;
        }
        #matrix-canvas { position: absolute; inset: 0; opacity: 0.4; }
        #intro-text { position: relative; font-size: clamp(1.8rem, 8vw, 4rem); font-weight: 900; color: var(--pink); text-align: center; padding: 15px; }

        /* ================= 4. النوت بوك (الحل الجذري للتداخل) ================= */
        #stars-canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
        .main-content {
            position: relative; z-index: 10; display: none; flex-direction: column; align-items: center; opacity: 0; transition: opacity 1s;
        }
        .book-container { 
            position: relative; width: var(--book-w); height: var(--book-h); 
        }
        .book { width: 100%; height: 100%; position: relative; }
        
        .page {
            position: absolute; inset: 0; border-radius: 15px; overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.8); border: 2px solid #333;
            transition: transform 0.6s ease-in-out, opacity 0.4s ease-in-out;
            background-color: #111; /* خلفية صلبة تمنع الشفافية تماماً */
        }

        .photo-layer { width: 100%; height: 100%; position: absolute; z-index: 1; background-color: #222; }
        .photo-layer img { width: 100%; height: 100%; object-fit: cover; }
        
        .overlay { 
            position: absolute; inset: 0; background: rgba(0, 0, 0, 0.5); z-index: 2; 
        }

        .content-layer {
            position: absolute; inset: 0; z-index: 3;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 25px; text-align: center; color: white; direction: rtl;
        }
        .quote-text { 
            font-size: clamp(1.1rem, 4.5vw, 1.5rem); 
            line-height: 1.8; font-weight: 700; 
            text-shadow: 2px 2px 6px #000;
        }

        /* ================= 5. القلوب (أصغر وملمومة جداً) ================= */
        #heart-container { position: fixed; top: 45%; left: 50%; z-index: 50; display: none; }
        .heart-img {
            position: absolute; 
            width: clamp(20px, 5vw, 35px); height: clamp(20px, 5vw, 35px); /* تصغير ملحوظ */
            border-radius: 5px; object-fit: cover; border: 1.5px solid #fff; 
            box-shadow: 0 0 8px var(--pink); opacity: 0; transition: all 1s ease-out;
            transform: translate(-50%, -50%);
        }
        
        #back-to-book-btn {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            padding: 10px 25px; background: var(--pink); border: none; font-weight: bold;
            color: white; border-radius: 30px; cursor: pointer; display: none; z-index: 2000;
            box-shadow: 0 0 15px var(--dark-pink);
        }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <button class="welcome-btn" onclick="startExperience()">Welcome To Logy's World</button>
        <div class="music-player" id="main-player">
            <button onclick="prevS()">⏮</button>
            <button id="pBtn" onclick="toggleM()">▶</button>
            <button onclick="nextS()">⏭</button>
            <audio id="audio" loop></audio>
        </div>
    </div>

    <div id="intro-screen">
        <canvas id="matrix-canvas"></canvas>
        <div id="intro-text">3</div>
    </div>

    <canvas id="stars-canvas"></canvas>

    <div class="main-content" id="main-content">
        <div class="book-container">
            <div class="book" id="book"></div>
        </div>
    </div>

    <div id="heart-container"></div>
    <button id="back-to-book-btn" onclick="returnToNotebook()">العودة للنوت بوك</button>

    <script>
        const audio = document.getElementById('audio');
        const tracks = ["1.mp3", "2.mp3", "3.mp3", "4.mp3", "5.mp3"];
        let cur = 0; audio.src = tracks[cur];

        function startExperience() {
            document.getElementById('welcome-screen').style.display = 'none';
            const player = document.getElementById('main-player');
            document.getElementById('main-content').appendChild(player);
            audio.play().catch(() => {});
            document.getElementById('pBtn').innerText = "⏸";
            document.getElementById('intro-screen').style.display = 'flex';
            startMatrix();
            startCountdown();
        }

        function startMatrix() {
            const mCanvas = document.getElementById('matrix-canvas');
            const mCtx = mCanvas.getContext('2d');
            mCanvas.width = window.innerWidth; mCanvas.height = window.innerHeight;
            const drops = Array(Math.floor(mCanvas.width/20)).fill(1);
            window.mInterval = setInterval(() => {
                mCtx.fillStyle = "rgba(0,0,0,0.05)"; mCtx.fillRect(0,0,mCanvas.width,mCanvas.height);
                mCtx.fillStyle = "#ff69b4"; mCtx.font = "20px monospace";
                drops.forEach((y, i) => {
                    const text = "LOGY"[Math.floor(Math.random()*4)];
                    mCtx.fillText(text, i*20, y*20);
                    if(y*20 > mCanvas.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                });
            }, 33);
        }

        function startCountdown() {
            const introText = document.getElementById('intro-text');
            const seq = ["3", "2", "1", "HAPPY BIRTHDAY", "LOGY", "MY SWEETHEART"];
            let sIdx = 0;
            const sInterval = setInterval(() => {
                sIdx++;
                if(sIdx < seq.length) { introText.innerText = seq[sIdx]; } 
                else {
                    clearInterval(sInterval); clearInterval(window.mInterval);
                    document.getElementById('intro-screen').style.display = 'none';
                    showMainContent();
                }
            }, 2000); 
        }

        function showMainContent() {
            const mc = document.getElementById('main-content');
            mc.style.display = 'flex';
            setTimeout(() => mc.style.opacity = '1', 50);
            initStars();
        }

        function initStars() {
            const sCanvas = document.getElementById('stars-canvas');
            const sCtx = sCanvas.getContext('2d');
            sCanvas.width = window.innerWidth; sCanvas.height = window.innerHeight;
            let stars = [];
            for(let i=0; i<60; i++) stars.push({x:Math.random()*sCanvas.width, y:Math.random()*sCanvas.height, r:Math.random()*1.2, s:Math.random()*0.3});
            function animate() {
                sCtx.clearRect(0,0,sCanvas.width,sCanvas.height);
                sCtx.fillStyle = "white";
                stars.forEach(s => {
                    sCtx.beginPath(); sCtx.arc(s.x, s.y, s.r, 0, Math.PI*2); sCtx.fill();
                    s.y -= s.s; if(s.y<0) s.y=sCanvas.height;
                });
                requestAnimationFrame(animate);
            }
            animate();
        }

        const quotes = [
            "أمرُّ على الديارِ ديارِ ليلى<br>أُقبِّلُ ذا الجدارَ وذا الجدارا",
            "لعينيكِ ما يلقى الفؤادُ وما لقي<br>وللحبِّ مالمْ يبقَ منّي وما بقي",
            "ولقد ذكرتكِ والرماحُ نواهلٌ<br>منّي وبيضُ الهندِ تقطرُ من دمي",
            "يا ظبيةَ البانِ ترعى في خمائلهِ<br>ليهنكِ اليومَ أنَّ القلبَ مرعاكِ",
            "تُحَدِّثُني الأحلامُ أنَّي أراكمُ<br>فيا لَيْتَ أحْلامَ المَنامِ يَقِينُ",
            "فما غابَ عن عيني خيالُكِ لحظةً<br>ولا زالَ ذِكرُكِ في فؤادي يترددُ"
        ];

        const book = document.getElementById('book');
        let currentZIndex = 100; // حل أزمة ترتيب الطبقات

        function createSinglePage(imgSrc, quote, isEnd = false) {
            const p = document.createElement('div');
            p.className = 'page';
            p.style.zIndex = currentZIndex--; // ترتيب الصفحات فوق بعض بدقة
            
            p.innerHTML = `
                <div class="photo-layer">
                    <img src="${imgSrc}" onerror="this.style.display='none'">
                </div>
                <div class="overlay"></div>
                <div class="content-layer">
                    <div class="quote-text">${quote}</div>
                </div>
            `;
            
            if(isEnd) {
                p.onclick = boom;
            } else {
                p.onclick = function() {
                    this.style.transform = "translateX(-110%) rotate(-10deg)";
                    this.style.opacity = "0";
                    // إخفاء الصفحة تماماً بعد ما تطير عشان متعملش زحمة
                    setTimeout(() => this.style.display = "none", 600); 
                };
            }
            return p;
        }

        // 1. إنشاء الغلاف (أول صفحة هتظهر)
        book.appendChild(createSinglePage('p1.jpeg', "<h1 style='color:var(--pink); margin-bottom:10px;'>LOGY WORLD</h1><br>اضغطي لتقليب الصفحات"));
        
        // 2. إنشاء الصفحات من 2 لـ 9
        for(let i=2; i<=9; i++) { 
            book.appendChild(createSinglePage(`p${i}.jpeg`, quotes[i % quotes.length])); 
        }
        
        // 3. إنشاء الصفحة الأخيرة
        book.appendChild(createSinglePage('p10.jpeg', "جاهزة للمفاجأة؟ اضغطي هنا ❤️", true));

        function boom() {
            document.getElementById('main-content').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('main-content').style.display = 'none';
                const container = document.getElementById('heart-container');
                container.style.display = 'block';
                container.innerHTML = '';
                
                const isMobile = window.innerWidth < 768;
                const spread = isMobile ? 6 : 9; // تصغير المدى عشان القلب يبقى ملموم

                for(let i=1; i<=25; i++) {
                    const img = document.createElement('img');
                    img.className = 'heart-img';
                    img.src = `h${i}.jpeg`;
                    img.onerror = function() { this.style.display='none'; };
                    container.appendChild(img);

                    let t = ((i-1) / 25) * Math.PI * 2;
                    let x = 16 * Math.pow(Math.sin(t), 3);
                    let y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));

                    setTimeout(() => {
                        img.style.opacity = "1";
                        img.style.left = `${x * spread}px`;
                        img.style.top = `${y * spread}px`;
                    }, i * 50);
                }
                setTimeout(() => { document.getElementById('back-to-book-btn').style.display = 'block'; }, 1800);
            }, 500);
        }

        function returnToNotebook() {
            // إخفاء القلوب وزرار العودة
            document.getElementById('heart-container').style.display = 'none';
            document.getElementById('back-to-book-btn').style.display = 'none';
            
            // إظهار المحتوى تاني
            const mc = document.getElementById('main-content');
            mc.style.display = 'flex';
            setTimeout(() => mc.style.opacity = '1', 50);
            
            // إرجاع كل الصفحات لمكانها وترتيبها
            const pages = document.querySelectorAll('.page');
            pages.forEach(p => {
                p.style.display = 'block';
                // انتظار بسيط عشان الـ display:block يشتغل قبل الـ animation
                setTimeout(() => {
                    p.style.transform = "none";
                    p.style.opacity = "1";
                }, 50);
            });
        }

        function toggleM() {
            if(audio.paused) { audio.play(); document.getElementById('pBtn').innerText="⏸"; }
            else { audio.pause(); document.getElementById('pBtn').innerText="▶"; }
        }
        function nextS() { cur=(cur+1)%5; audio.src=tracks[cur]; audio.play(); }
        function prevS() { cur=(cur-1+5)%5; audio.src=tracks[cur]; audio.play(); }
    </script>
</body>
</html>
